# 将 package.json 的 homepage 同步到 GitHub 仓库 About「Website」
name: Sync repo About

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - package.json
      - .github/workflows/sync-repo-about.yml

permissions:
  contents: read
  administration: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Update repository About (Website)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            const homepage = pkg.homepage;
            if (!homepage) {
              core.setFailed("package.json missing homepage field");
              return;
            }
            await github.rest.repos.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              homepage,
            });
            core.info(`About website set to ${homepage}`);
